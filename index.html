<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌸 Chúc Mừng Ngày 8/3</title>
    <meta name="description" content="Một món quà nhỏ nhân ngày Quốc tế Phụ nữ 8/3" />

    <!-- Open Graph (khi share link trên Zalo / FB trông đẹp hơn) -->
    <meta property="og:title" content="🌸 Chúc Mừng Ngày 8/3 — Một món quà nhỏ dành riêng cho bạn" />
    <meta property="og:description" content="Mở ra để xem lời chúc đặc biệt nhé!" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Falling petals -->
    <canvas id="petals"></canvas>

    <!-- ══ ENVELOPE INTRO (mở phong bì) ════════════════════════ -->
    <div class="envelope-screen" id="envelope-screen">
        <div class="env-wrap">
            <div class="envelope" id="envelope">
                <div class="env-flap"></div>
                <div class="env-body">
                    <span class="env-icon">💌</span>
                    <p class="env-hint">Nhấn để mở</p>
                </div>
            </div>
        </div>
        <p class="env-sub">Thanh Duy muốn gửi đến bạn…</p>
    </div>

    <!-- ══ THIỆP CHÍNH ═══════════════════════════════════════════ -->
    <main class="card-screen hidden" id="card-screen">

        <!-- petals overlay inside card too -->
        <div class="card-glow" id="card-glow"></div>

        <div class="gift-card" id="gift-card">

            <!-- Header -->
            <div class="gc-header">
                <div class="gc-date">08 · 03</div>
                <div class="gc-icon" id="gc-icon">🌸</div>
                <div class="gc-relation" id="gc-relation">Người thân yêu</div>
                <h1 class="gc-name" id="gc-name">Gửi bạn…</h1>
            </div>

            <!-- Divider -->
            <div class="gc-divider">
                <span>🌷</span><span>🌸</span><span>🌷</span>
            </div>

            <!-- Message body -->
            <div class="gc-message" id="gc-message">
                <!-- filled by JS -->
            </div>

            <!-- Signature -->
            <div class="gc-signature" id="gc-signature">
                — Với tất cả yêu thương 🌸
            </div>

            <!-- Footer tag -->
            <div class="gc-tag">
                Chúc Mừng Ngày Quốc Tế Phụ Nữ <strong>8/3</strong> 🌺
            </div>
        </div>

        <!-- Confetti trigger -->
        <canvas id="confetti" class="confetti-canvas"></canvas>

    </main>

    <!-- ══ NOT FOUND ═════════════════════════════════════════════ -->
    <div class="not-found hidden" id="not-found">
        <div class="nf-emoji">🔍</div>
        <p>Thiệp này chưa được tạo.</p>
        <p class="nf-hint">Kiểm tra lại đường dẫn bạn nhé!</p>
    </div>

    <script src="messages.js"></script>
    <script src="main.js"></script>
</body>

</html>
